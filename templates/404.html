{% extends "base.html" %}
{% block title %}Page Not Found — CEUKI India{% endblock %}

{% block content %}
<section class="error-page">
  <div class="container">
    <div class="error-emoji">🔍</div>
    <h1 class="error-code">404</h1>
    <h2 class="error-heading">Page Not Found</h2>
    <p class="error-body">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">← Back to Home</a>
      <a href="{{ url_for('contact') }}" class="btn btn-outline btn-lg">Contact Us</a>
    </div>
  </div>
</section>
{% endblock %}
